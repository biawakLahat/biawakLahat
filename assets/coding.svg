<svg width="960" height="420" viewBox="0 0 960 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated developer coding scene</title>
  <desc id="desc">A developer coding at a laptop with animated code lines and subtle interface motion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08110f"/>
      <stop offset="0.45" stop-color="#15100f"/>
      <stop offset="1" stop-color="#0b0d14"/>
    </linearGradient>
    <linearGradient id="panel" x1="175" y1="60" x2="790" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#211b1b"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f3d58c"/>
      <stop offset="1" stop-color="#b9923f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="960" height="420" rx="30" fill="url(#bg)"/>
  <ellipse cx="482" cy="222" rx="330" ry="134" fill="#c8ad5f" opacity="0.11" filter="url(#soft)">
    <animate attributeName="opacity" values="0.08;0.15;0.08" dur="5.2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="685" cy="130" rx="120" ry="92" fill="#2dd4bf" opacity="0.09" filter="url(#soft)">
    <animate attributeName="cx" values="670;700;670" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <g filter="url(#shadow)">
    <rect x="138" y="56" width="684" height="310" rx="26" fill="url(#panel)" stroke="#33443f"/>
    <rect x="164" y="84" width="632" height="42" rx="14" fill="#0f1717" stroke="#2b3e3a"/>
    <circle cx="192" cy="105" r="6" fill="#ef4444"/>
    <circle cx="215" cy="105" r="6" fill="#f59e0b"/>
    <circle cx="238" cy="105" r="6" fill="#2dd4bf"/>
    <rect x="650" y="98" width="112" height="14" rx="7" fill="#24302e"/>
  </g>

  <g transform="translate(178 150)">
    <rect x="0" y="0" width="270" height="170" rx="18" fill="#0b1112" stroke="#2f4540"/>
    <text x="24" y="35" fill="#c8ad5f" font-family="Consolas, Monaco, monospace" font-size="18" font-weight="700">payby/workspace</text>
    <g font-family="Consolas, Monaco, monospace" font-size="15" font-weight="600">
      <text x="24" y="72" fill="#8ddfcf">const</text>
      <text x="70" y="72" fill="#f5efe4">media = await shelby.publish()</text>
      <text x="24" y="104" fill="#c8ad5f">registry</text>
      <text x="98" y="104" fill="#f5efe4">.recordAccess(policy)</text>
      <text x="24" y="136" fill="#8ddfcf">wallet</text>
      <text x="80" y="136" fill="#f5efe4">.signAndSubmit()</text>
      <rect x="226" y="123" width="9" height="18" rx="2" fill="#f5efe4">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <rect x="22" y="152" width="110" height="5" rx="3" fill="#2dd4bf" opacity="0.55">
      <animate attributeName="width" values="58;132;88;160;58" dur="4.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(565 148)">
    <rect x="-76" y="128" width="278" height="34" rx="17" fill="#101719" stroke="#33443f"/>
    <rect x="-52" y="0" width="228" height="142" rx="18" fill="#151e1c" stroke="#3b514c"/>
    <rect x="-30" y="22" width="184" height="14" rx="7" fill="#263431">
      <animate attributeName="width" values="120;184;148;184;120" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="-30" y="54" width="150" height="14" rx="7" fill="#c8ad5f" opacity="0.75">
      <animate attributeName="width" values="80;150;116;168;80" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-30" y="86" width="178" height="14" rx="7" fill="#2dd4bf" opacity="0.62">
      <animate attributeName="width" values="150;92;178;130;150" dur="5s" repeatCount="indefinite"/>
    </rect>
    <path d="M13 162h100" stroke="#c8ad5f" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(454 120)">
    <path d="M72 52c0 30-22 54-50 54S-28 82-28 52  -6-2 22-2s50 24 50 54Z" fill="#2a2422" stroke="#4d6a60" stroke-width="2"/>
    <circle cx="22" cy="50" r="35" fill="#d5b66a"/>
    <path d="M-14 52c12 8 26 12 42 12 15 0 28-3 39-10-3 30-21 48-46 48-23 0-39-18-35-50Z" fill="#161513"/>
    <path d="M-22 50c8-30 26-48 54-48 24 0 42 15 45 42-27-2-51-10-72-25-7 10-16 20-27 31Z" fill="#111827"/>
    <rect x="-46" y="102" width="136" height="112" rx="42" fill="#17221f" stroke="#46635a"/>
    <path d="M-27 130c24 16 74 16 98 0" stroke="#c8ad5f" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
    <g>
      <path d="M-40 157c-38 8-58 26-70 58" stroke="#d5b66a" stroke-width="16" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="0 -40 157;-5 -40 157;0 -40 157" dur="1.7s" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M84 158c36 9 58 28 70 60" stroke="#d5b66a" stroke-width="16" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate" values="0 84 158;5 84 158;0 84 158" dur="1.55s" repeatCount="indefinite"/>
    </g>
  </g>

  <g transform="translate(366 286)" filter="url(#shadow)">
    <path d="M0 0h228c13 0 24 9 27 22l18 72H35c-13 0-24-9-27-22L0 0Z" fill="#202625" stroke="#52635d"/>
    <path d="M97 34h66" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
    <path d="M101 55h56" stroke="#2dd4bf" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">
    <text x="72" y="84" fill="#f5efe4" font-size="34">Luxe</text>
    <text x="72" y="116" fill="#9ca3af" font-size="16">Web3 creator tools</text>
    <text x="740" y="326" fill="#c8ad5f" font-size="14" letter-spacing="2">SHELBY</text>
    <text x="740" y="348" fill="#e5e7eb" font-size="20">Aptos access records</text>
  </g>
</svg>
